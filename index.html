<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>onemancell tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:        #FF6B1A;
      --brand-dark:   #E85A0D;
      --brand-soft:   #FFE8D6;
      --brand-softer: #FFF4EC;

      --ink-900: #2A1810;
      --ink-700: #5A4A40;
      --ink-500: #8A7A70;
      --ink-300: #D4C9C0;
      --ink-100: #F5EFE9;
      --ink-50:  #FAF6F2;

      --radius-md: 16px;
      --radius-lg: 24px;
      --shadow-card: 0 4px 16px rgba(42,24,16,.06);
      --shadow-hover: 0 12px 32px rgba(255,107,26,.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'M PLUS Rounded 1c', system-ui, sans-serif;
      background: var(--ink-50);
      color: var(--ink-900);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .logo span {
      color: var(--ink-500);
      font-weight: 500;
    }

    .tagline {
      font-size: .85rem;
      color: var(--ink-500);
      margin-bottom: 32px;
    }

    .tools-label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--ink-500);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 12px;
    }

    .tool-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--ink-50);
      border: 1.5px solid var(--ink-100);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--ink-900);
      transition: border-color .2s, box-shadow .2s, transform .15s;
      margin-bottom: 10px;
    }

    .tool-link:hover {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(255,107,26,.12);
      transform: translateY(-2px);
    }

    .tool-icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--brand-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      transition: transform .2s;
    }

    .tool-link:hover .tool-icon-wrap {
      transform: scale(1.08) rotate(-5deg);
    }

    .tool-info { text-align: left; }
    .tool-name { font-weight: 700; font-size: .95rem; }
    .tool-desc { font-size: .78rem; color: var(--ink-500); margin-top: 3px; }

  </style>
</head>
<body>
  <div class="card">
    <div class="logo">onemancell<span> tools</span></div>
    <div class="tagline">べんりツールズ</div>

    <div class="tools-label">ツール一覧</div>

    <a class="tool-link" href="/dice/">
      <div class="tool-icon-wrap">🎲</div>
      <div class="tool-info">
        <div class="tool-name">エモクロアダイスツール</div>
        <div class="tool-desc">エモクロアTRPG 用の判定・ステータス管理</div>
      </div>
    </a>

    <a class="tool-link" href="/mandala/">
      <div class="tool-icon-wrap">🧩</div>
      <div class="tool-info">
        <div class="tool-name">曼荼羅タスク分解</div>
        <div class="tool-desc">3×3 グリッドでタスクを細分化・整理</div>
      </div>
    </a>

    <a class="tool-link" href="/pomo/">
      <div class="tool-icon-wrap">🍅</div>
      <div class="tool-info">
        <div class="tool-name">ポモドーロタイマー</div>
        <div class="tool-desc">25分集中・休憩サイクルで生産性アップ</div>
      </div>
    </a>

    <a class="tool-link" href="/noise/">
      <div class="tool-icon-wrap">🌙</div>
      <div class="tool-info">
        <div class="tool-name">のんびりノイズ</div>
        <div class="tool-desc">雨・波・風・焚き火を自由にミックスできるノイズミキサー</div>
      </div>
    </a>

  </div>
</body>
</html>
