<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スイングバイ - onemancell tools</title>
  <meta name="theme-color" content="#070B1B">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="hud-left">
      <a class="back" href="/">← tools</a>
      <button class="badge" id="retry-btn" style="cursor:pointer;font-family:inherit;color:#E8ECF8;">↺ やり直す</button>
      <button class="badge" id="demo-btn" style="cursor:pointer;font-family:inherit;color:#E8ECF8;">👁 お手本</button>
      <button class="badge" id="exit-btn" style="display:none;cursor:pointer;font-family:inherit;color:#E8ECF8;">✕ 終了</button>
    </div>
    <div class="hud-right">
      <div class="badge"><span class="label">STAGE</span><span class="val" id="stage-num">1/6</span></div>
      <div class="badge"><span class="label">SHOTS</span><span class="val" id="shots-count">0</span></div>
    </div>
  </div>

  <div id="overlay">
    <div class="title">
      <div class="title-en">SWINGBY</div>
      <div class="title-ja">スイングバイ</div>
      <div class="title-divider"></div>
    </div>
    <div class="sub" id="overlay-sub">全6ステージを、合計何発でクリアできるか挑戦！<br>1発で2つの的を壊したらクリア。</div>
    <div id="best-display" style="font-size:.78rem;color:#B8C2D6;margin-top:6px;display:none;">
      ベスト: <span id="best-val" style="color:#FFD178;font-weight:800;">-</span> 発
    </div>
    <button class="start-btn" id="start-btn">スタート</button>
    <button type="button" id="watch-btn">🎬 観るだけモード</button>
    <div class="hint" id="hint-text">↺やり直す自由・👁お手本を一度でも使うと記録なし</div>
  </div>

  <div id="result-overlay" class="hidden" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:8;pointer-events:none;transition:opacity .25s;">
    <div id="result-title" style="font-size:2.4rem;font-weight:800;letter-spacing:.04em;text-shadow:0 0 20px rgba(0,0,0,.6);"></div>
    <div id="result-sub" style="font-size:.85rem;color:#B8C2D6;text-shadow:0 0 8px rgba(0,0,0,.6);"></div>
  </div>

  <div class="controls" id="controls" style="display:none;">
    <button type="button" class="ctrl-btn" data-input="left" aria-label="左へ移動">←</button>
    <button type="button" class="ctrl-btn" data-input="rotL" aria-label="左回転">↺</button>
    <button type="button" class="fire-btn" id="fire-btn">FIRE</button>
    <button type="button" class="ctrl-btn" data-input="rotR" aria-label="右回転">↻</button>
    <button type="button" class="ctrl-btn" data-input="right" aria-label="右へ移動">→</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
