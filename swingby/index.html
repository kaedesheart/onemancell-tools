<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スイングバイ - onemancell tools</title>
  <meta name="theme-color" content="#070B1B">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #070B1B;
      color: #E8ECF8;
      font-family: 'M PLUS Rounded 1c', -apple-system, system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(80,120,200,.15), transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(180,90,200,.10), transparent 55%),
        #070B1B;
      touch-action: none;
    }

    .hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }

    .hud-left, .hud-right {
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: auto;
    }

    .hud a.back {
      color: #B8C2D6;
      text-decoration: none;
      font-size: .82rem;
      font-weight: 700;
    }
    .hud a.back:hover { color: #E8ECF8; }

    .badge {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .04em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .badge .label {
      color: #7A86A0;
      margin-right: 6px;
      font-size: .68rem;
    }
    .badge .val {
      color: #FFD178;
      font-variant-numeric: tabular-nums;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 11, 27, .82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      z-index: 10;
      transition: opacity .25s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay .title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: .03em;
      color: #FFFFFF;
    }
    #overlay .title .accent { color: #FFD178; }
    #overlay .sub {
      font-size: .85rem;
      color: #B8C2D6;
      max-width: 320px;
      text-align: center;
      line-height: 1.7;
      margin: 0 24px;
    }
    #overlay .start-btn {
      margin-top: 20px;
      background: #FFD178;
      color: #1A1408;
      border: none;
      border-radius: 999px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 0 0 0 rgba(255, 209, 120, .4);
      transition: transform .12s, box-shadow .25s, background .15s;
      touch-action: manipulation;
    }
    .start-btn:active { transform: scale(.95); }
    .start-btn:hover { box-shadow: 0 0 0 8px rgba(255, 209, 120, .15); }

    .hint {
      font-size: .75rem;
      color: #7A86A0;
      margin-top: 6px;
    }

    #result-overlay.hidden { opacity: 0; }
    #result-overlay.show { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="hud-left">
      <a class="back" href="/">← tools</a>
      <button class="badge" id="retry-btn" style="cursor:pointer;border:1px solid rgba(255,255,255,.1);font-family:inherit;color:#E8ECF8;">↺ やり直す</button>
    </div>
    <div class="hud-right">
      <div class="badge"><span class="label">STAGE</span><span class="val" id="stage-num">1</span></div>
      <div class="badge"><span class="label">TARGET</span><span class="val" id="target-count">0/0</span></div>
    </div>
  </div>

  <div id="overlay">
    <div class="title">スイング<span class="accent">バイ</span></div>
    <div class="sub">一発の弾で、的を全部壊せ。<br>惑星の重力を使って軌道を曲げよう。</div>
    <button class="start-btn" id="start-btn">スタート</button>
    <div class="hint">タップ/クリックで照準・発射</div>
  </div>

  <div id="result-overlay" class="hidden" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:8;pointer-events:none;transition:opacity .25s;">
    <div id="result-title" style="font-size:2.4rem;font-weight:800;letter-spacing:.04em;text-shadow:0 0 20px rgba(0,0,0,.6);"></div>
    <div id="result-sub" style="font-size:.85rem;color:#B8C2D6;text-shadow:0 0 8px rgba(0,0,0,.6);"></div>
  </div>

  <script>
    // ===== Canvas / DPR =====
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    let DPR = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0, H = 0;

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== Stages (puzzle definitions) =====
    // 座標は 0..1 の比率（W/Hに対する相対値）
    const STAGES = [
      {
        name: 'はじめの一歩',
        player:  { x: 0.5, y: 0.85 },
        planets: [
          { x: 0.35, y: 0.55, r: 26, mass: 1300, color: '#7CC8E8' },
          { x: 0.65, y: 0.55, r: 26, mass: 1300, color: '#7CC8E8' },
        ],
        targets: [
          { x: 0.20, y: 0.30 },
          { x: 0.80, y: 0.30 },
        ],
      },
      {
        name: 'まわりこみ',
        player:  { x: 0.5, y: 0.88 },
        planets: [
          { x: 0.35, y: 0.50, r: 32, mass: 2000, color: '#FFB270' },
          { x: 0.70, y: 0.30, r: 24, mass: 900,  color: '#7CC8E8' },
        ],
        targets: [
          { x: 0.18, y: 0.62 },
          { x: 0.85, y: 0.18 },
        ],
      },
      {
        name: 'ジグザグ',
        player:  { x: 0.5, y: 0.88 },
        planets: [
          { x: 0.30, y: 0.62, r: 28, mass: 1500, color: '#7CC8E8' },
          { x: 0.70, y: 0.30, r: 28, mass: 1500, color: '#FFB270' },
        ],
        targets: [
          { x: 0.18, y: 0.30 },
          { x: 0.82, y: 0.62 },
        ],
      },
      {
        name: '挟撃',
        player:  { x: 0.5, y: 0.85 },
        planets: [
          { x: 0.50, y: 0.40, r: 38, mass: 2600, color: '#FFB270' },
          { x: 0.50, y: 0.18, r: 22, mass: 700,  color: '#7CC8E8' },
        ],
        targets: [
          { x: 0.15, y: 0.40 },
          { x: 0.85, y: 0.40 },
        ],
      },
      {
        name: '逆走スイングバイ',
        player:  { x: 0.5, y: 0.90 },
        planets: [
          { x: 0.25, y: 0.78, r: 26, mass: 1500, color: '#FFB270' },
          { x: 0.75, y: 0.78, r: 26, mass: 1500, color: '#FFB270' },
        ],
        targets: [
          { x: 0.30, y: 0.20 },
          { x: 0.70, y: 0.20 },
        ],
      },
      {
        name: '巨星',
        player:  { x: 0.5, y: 0.88 },
        planets: [
          { x: 0.30, y: 0.45, r: 44, mass: 3200, color: '#C99BFF' },
          { x: 0.78, y: 0.55, r: 22, mass: 700,  color: '#7CC8E8' },
        ],
        targets: [
          { x: 0.10, y: 0.18 },
          { x: 0.92, y: 0.20 },
        ],
      },
    ];

    // ===== State =====
    const state = {
      running: false,
      stage: 0,
      attempts: 0,
      player: { x: 0, y: 0, r: 14, angle: -Math.PI / 2 },
      planets: [],
      targets: [],
      stars: [],
      bullets: [],
      aim: { x: 0, y: 0, active: false },
      flash: 0,         // 失敗演出用
      lockInput: false, // ステージ切替演出中
    };

    // ===== Physics constants =====
    const G = 80000;
    const BULLET_SPEED = 380;
    const BULLET_LIFE = 7;
    const TARGET_R = 13;

    function makeStars(n) {
      const stars = [];
      for (let i = 0; i < n; i++) {
        stars.push({
          x: Math.random(),
          y: Math.random(),
          r: Math.random() * 1.2 + 0.3,
          a: Math.random() * 0.7 + 0.2,
        });
      }
      return stars;
    }

    function loadStage(idx) {
      const def = STAGES[idx % STAGES.length];
      state.player.x = def.player.x * W;
      state.player.y = def.player.y * H;
      state.aim.x = state.player.x;
      state.aim.y = state.player.y - 200;
      state.planets = def.planets.map(p => ({
        x: p.x * W, y: p.y * H, r: p.r, mass: p.mass, color: p.color,
      }));
      state.targets = def.targets.map(t => ({
        x: t.x * W, y: t.y * H, r: TARGET_R, hit: false,
      }));
      state.bullets = [];
      state.stars = makeStars(120);
      updateHUD();
    }

    function updateHUD() {
      document.getElementById('stage-num').textContent = (state.stage + 1) + ' / ' + STAGES.length;
      const remaining = state.targets.filter(t => !t.hit).length;
      const total = state.targets.length;
      document.getElementById('target-count').textContent = (total - remaining) + '/' + total;
    }

    function bulletInFlight() { return state.bullets.length > 0; }
    function allCleared() { return state.targets.length > 0 && state.targets.every(t => t.hit); }

    // ===== Physics =====
    function gravityAt(x, y) {
      let ax = 0, ay = 0;
      for (const p of state.planets) {
        const dx = p.x - x;
        const dy = p.y - y;
        const r = Math.hypot(dx, dy);
        const safeR = Math.max(r, p.r * 0.6);
        const inv3 = 1 / (safeR * safeR * safeR);
        const a = G * p.mass * inv3;
        ax += a * dx;
        ay += a * dy;
      }
      return { ax, ay };
    }

    function fire() {
      if (!state.running || state.lockInput || bulletInFlight()) return;
      const p = state.player;
      const dx = state.aim.x - p.x;
      const dy = state.aim.y - p.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = dx / len, ny = dy / len;
      state.bullets.push({
        x: p.x + nx * (p.r + 6),
        y: p.y + ny * (p.r + 6),
        vx: nx * BULLET_SPEED,
        vy: ny * BULLET_SPEED,
        life: BULLET_LIFE,
        trail: [],
      });
      state.attempts++;
    }

    function endShotFailed() {
      state.bullets = [];
      state.flash = 0.6;
      // 当たった的を戻す（潰したけど他を外したらやり直し）
      for (const t of state.targets) t.hit = false;
      updateHUD();
      showResult('miss', 'もう一度', '惑星に当たった or 外れた');
    }

    function endShotCleared() {
      state.bullets = [];
      state.lockInput = true;
      const isLast = state.stage >= STAGES.length - 1;
      if (isLast) {
        showResult('clear', 'ALL CLEAR！', 'もう一周しますか？', 1800);
        setTimeout(() => {
          state.stage = 0;
          loadStage(state.stage);
          state.lockInput = false;
          hideResult();
        }, 1900);
      } else {
        showResult('clear', 'STAGE CLEAR', '次のステージへ', 1100);
        setTimeout(() => {
          state.stage++;
          loadStage(state.stage);
          state.lockInput = false;
          hideResult();
        }, 1200);
      }
    }

    function updateBullets(dt) {
      const startedWithBullets = state.bullets.length > 0;

      for (const b of state.bullets) {
        const g = gravityAt(b.x, b.y);
        b.vx += g.ax * dt;
        b.vy += g.ay * dt;
        b.x  += b.vx * dt;
        b.y  += b.vy * dt;
        b.life -= dt;
        b.trail.push({ x: b.x, y: b.y });
        if (b.trail.length > 28) b.trail.shift();

        // 的との衝突判定
        for (const t of state.targets) {
          if (t.hit) continue;
          const dx = b.x - t.x, dy = b.y - t.y;
          const rr = t.r + 4;
          if (dx * dx + dy * dy < rr * rr) {
            t.hit = true;
            updateHUD();
          }
        }
      }

      // 死亡弾の除去
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        const offBounds = b.x < -60 || b.x > W + 60 || b.y < -60 || b.y > H + 60;
        let hitPlanet = false;
        for (const p of state.planets) {
          const dx = b.x - p.x, dy = b.y - p.y;
          if (dx * dx + dy * dy < p.r * p.r) { hitPlanet = true; break; }
        }
        if (b.life <= 0 || offBounds || hitPlanet) {
          state.bullets.splice(i, 1);
        }
      }

      // 飛行終了の判定（同フレーム消滅も拾える）
      if (startedWithBullets && state.bullets.length === 0 && state.running && !state.lockInput) {
        if (allCleared()) endShotCleared();
        else endShotFailed();
      }
    }

    function predictPath() {
      const p = state.player;
      const dx = state.aim.x - p.x;
      const dy = state.aim.y - p.y;
      const len = Math.hypot(dx, dy) || 1;
      let x = p.x + (dx / len) * (p.r + 6);
      let y = p.y + (dy / len) * (p.r + 6);
      let vx = (dx / len) * BULLET_SPEED;
      let vy = (dy / len) * BULLET_SPEED;
      const path = [];
      const sub = 1 / 60;
      for (let i = 0; i < 110; i++) {
        const g = gravityAt(x, y);
        vx += g.ax * sub;
        vy += g.ay * sub;
        x  += vx * sub;
        y  += vy * sub;
        if (x < 0 || x > W || y < 0 || y > H) break;
        let hit = false;
        for (const pl of state.planets) {
          const ddx = x - pl.x, ddy = y - pl.y;
          if (ddx * ddx + ddy * ddy < pl.r * pl.r) { hit = true; break; }
        }
        if (hit) break;
        if (i % 2 === 0) path.push({ x, y });
      }
      return path;
    }

    function updatePlayer() {
      const dx = state.aim.x - state.player.x;
      const dy = state.aim.y - state.player.y;
      state.player.angle = Math.atan2(dy, dx);
    }

    // ===== Render =====
    function drawStars() {
      ctx.save();
      for (const s of state.stars) {
        ctx.globalAlpha = s.a;
        ctx.fillStyle = '#E8ECF8';
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPlanet(p) {
      // 重力場リング
      ctx.save();
      const grad = ctx.createRadialGradient(p.x, p.y, p.r * 0.8, p.x, p.y, p.r * 4);
      grad.addColorStop(0, p.color + '55');
      grad.addColorStop(1, p.color + '00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fill();
      // 本体
      const body = ctx.createRadialGradient(
        p.x - p.r * 0.4, p.y - p.r * 0.4, p.r * 0.2,
        p.x, p.y, p.r
      );
      body.addColorStop(0, '#ffffff');
      body.addColorStop(0.4, p.color);
      body.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPlayer(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      // ボディ
      ctx.fillStyle = '#FFD178';
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p.r, 0);
      ctx.lineTo(-p.r * 0.8, p.r * 0.65);
      ctx.lineTo(-p.r * 0.4, 0);
      ctx.lineTo(-p.r * 0.8, -p.r * 0.65);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // コックピット
      ctx.fillStyle = '#7CC8E8';
      ctx.beginPath();
      ctx.arc(0, 0, p.r * 0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawAimLine(path) {
      if (!path.length || bulletInFlight()) return;
      ctx.save();
      for (let i = 0; i < path.length; i++) {
        const t = 1 - i / path.length;
        ctx.globalAlpha = t * 0.55;
        ctx.fillStyle = '#FFD178';
        ctx.beginPath();
        ctx.arc(path[i].x, path[i].y, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawTarget(t, time) {
      ctx.save();
      if (t.hit) {
        // 撃破済みは小さく薄く
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = '#FFD178';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * 0.5, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        const pulse = 1 + Math.sin(time * 4) * 0.08;
        // グロウ
        const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, t.r * 2.4);
        grad.addColorStop(0, 'rgba(255, 230, 150, 0.55)');
        grad.addColorStop(1, 'rgba(255, 209, 120, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * 2.4, 0, Math.PI * 2);
        ctx.fill();
        // リング
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#FFE7A5';
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * pulse, 0, Math.PI * 2);
        ctx.stroke();
        // 中心
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawBullet(b) {
      ctx.save();
      // 軌跡
      for (let i = 0; i < b.trail.length; i++) {
        const t = i / b.trail.length;
        ctx.globalAlpha = t * 0.55;
        ctx.fillStyle = '#FFD178';
        const tp = b.trail[i];
        ctx.beginPath();
        ctx.arc(tp.x, tp.y, 1.5 + t * 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // 弾本体
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 9);
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.4, '#FFD178');
      grad.addColorStop(1, 'rgba(255,209,120,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function render(time) {
      ctx.clearRect(0, 0, W, H);
      // 失敗フラッシュ
      if (state.flash > 0) {
        ctx.fillStyle = 'rgba(240, 138, 138,' + Math.min(0.25, state.flash * 0.4) + ')';
        ctx.fillRect(0, 0, W, H);
      }
      drawStars();
      for (const p of state.planets) drawPlanet(p);
      for (const t of state.targets) drawTarget(t, time);
      if (state.running) {
        drawAimLine(predictPath());
        for (const b of state.bullets) drawBullet(b);
      }
      drawPlayer(state.player);
    }

    // ===== Game loop =====
    let last = 0;
    function loop(ts) {
      const dt = Math.min(0.05, (ts - last) / 1000 || 0);
      last = ts;
      if (state.running) {
        updatePlayer();
        updateBullets(dt);
        state.flash = Math.max(0, state.flash - dt);
      }
      render(ts / 1000);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ===== Result overlay =====
    const resultOverlay = document.getElementById('result-overlay');
    const resultTitle = document.getElementById('result-title');
    const resultSub = document.getElementById('result-sub');
    function showResult(kind, title, sub, ms) {
      resultTitle.textContent = title;
      resultSub.textContent = sub || '';
      resultTitle.style.color = kind === 'clear' ? '#FFD178' : '#F08A8A';
      resultOverlay.classList.remove('hidden');
      resultOverlay.classList.add('show');
      clearTimeout(showResult._t);
      showResult._t = setTimeout(hideResult, ms || 900);
    }
    function hideResult() {
      resultOverlay.classList.remove('show');
      resultOverlay.classList.add('hidden');
    }

    // ===== Input =====
    function pointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
    canvas.addEventListener('pointermove', (e) => {
      const pos = pointerPos(e);
      state.aim.x = pos.x;
      state.aim.y = pos.y;
      state.aim.active = true;
    });
    canvas.addEventListener('pointerdown', (e) => {
      const pos = pointerPos(e);
      state.aim.x = pos.x;
      state.aim.y = pos.y;
      state.aim.active = true;
      fire();
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // ===== Start =====
    const overlay = document.getElementById('overlay');
    document.getElementById('start-btn').addEventListener('click', () => {
      state.stage = 0;
      state.attempts = 0;
      loadStage(state.stage);
      state.running = true;
      overlay.classList.add('hidden');
    });

    document.getElementById('retry-btn').addEventListener('click', () => {
      if (!state.running || state.lockInput) return;
      state.bullets = [];
      loadStage(state.stage);
    });

    window.addEventListener('resize', () => {
      if (state.running) loadStage(state.stage);
    });
  </script>
</body>
</html>
