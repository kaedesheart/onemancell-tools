<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スイングバイ - ワンマンセル ツールズ</title>
  <meta name="theme-color" content="#070B1B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Swingby">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="vignette"></div>

  <div class="hud">
    <div class="hud-left">
      <button class="icon-btn" id="retry-btn" aria-label="やり直す" title="やり直す">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </button>
      <button class="icon-btn" id="demo-btn" aria-label="お手本" title="お手本">
        <svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="icon-btn" id="exit-btn" style="display:none;" aria-label="タイトルへ" title="タイトルへ">
        <svg viewBox="0 0 24 24"><path d="M15 6 L9 12 L15 18"/></svg>
      </button>
    </div>
    <div class="hud-right">
      <div class="badge"><span class="label">STAGE</span><span class="val" id="stage-num">1/6</span></div>
      <div class="badge"><span class="label">SHOTS</span><span class="val" id="shots-count">0</span></div>
    </div>
  </div>

  <div id="overlay">
    <div class="title">
      <div class="title-en">SWINGBY</div>
      <div class="title-ja">スイングバイ</div>
      <div class="title-divider"></div>
    </div>
    <div class="sub" id="overlay-sub">全6ステージを、合計何発でクリアできるか挑戦！<br>1発で2つの的を壊したらクリア。</div>
    <div id="best-display" style="font-size:.78rem;color:#B8C2D6;margin-top:6px;display:none;">
      ベスト: <span id="best-val" style="color:#FFD178;font-weight:800;">-</span> 発
    </div>
    <button class="start-btn" id="start-btn">スタート</button>
    <button type="button" id="watch-btn">🎬 観るだけモード</button>
    <button type="button" id="mute-btn" style="margin-top:14px;background:transparent;border:none;color:rgba(122,134,160,.85);font-family:inherit;font-size:.78rem;cursor:pointer;letter-spacing:.04em;padding:4px 10px;">🔊 サウンド ON</button>
    <div class="hint" id="hint-text">↺やり直す自由・👁お手本を一度でも使うと記録なし</div>
  </div>

  <div id="result-overlay" class="hidden" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:8;pointer-events:none;transition:opacity .25s;">
    <div id="result-title"></div>
    <div id="result-sub"></div>
  </div>

  <div class="controls" id="controls" style="display:none;">
    <button type="button" class="ctrl-btn" data-input="left" aria-label="左へ移動">
      <svg viewBox="0 0 24 24"><path d="M15 6 L9 12 L15 18"/></svg>
    </button>
    <button type="button" class="ctrl-btn" data-input="rotL" aria-label="左回転">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
    </button>
    <button type="button" class="fire-btn" id="fire-btn">FIRE</button>
    <button type="button" class="ctrl-btn" data-input="rotR" aria-label="右回転">
      <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
    </button>
    <button type="button" class="ctrl-btn" data-input="right" aria-label="右へ移動">
      <svg viewBox="0 0 24 24"><path d="M9 6 L15 12 L9 18"/></svg>
    </button>
  </div>

  <script src="game.js"></script>
</body>
</html>
