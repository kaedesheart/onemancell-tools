<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スイングバイ - onemancell tools</title>
  <meta name="theme-color" content="#070B1B">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #070B1B;
      color: #E8ECF8;
      font-family: 'M PLUS Rounded 1c', -apple-system, system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(80,120,200,.15), transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(180,90,200,.10), transparent 55%),
        #070B1B;
      touch-action: none;
    }

    .hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }

    .hud-left, .hud-right {
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: auto;
    }

    .hud a.back {
      color: #B8C2D6;
      text-decoration: none;
      font-size: .82rem;
      font-weight: 700;
    }
    .hud a.back:hover { color: #E8ECF8; }

    .badge {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .04em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .badge .label {
      color: #7A86A0;
      margin-right: 6px;
      font-size: .68rem;
    }
    .badge .val {
      color: #FFD178;
      font-variant-numeric: tabular-nums;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 11, 27, .82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      z-index: 10;
      transition: opacity .25s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay .title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: .03em;
      color: #FFFFFF;
    }
    #overlay .title .accent { color: #FFD178; }
    #overlay .sub {
      font-size: .85rem;
      color: #B8C2D6;
      max-width: 320px;
      text-align: center;
      line-height: 1.7;
      margin: 0 24px;
    }
    #overlay .start-btn {
      margin-top: 20px;
      background: #FFD178;
      color: #1A1408;
      border: none;
      border-radius: 999px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 0 0 0 rgba(255, 209, 120, .4);
      transition: transform .12s, box-shadow .25s, background .15s;
      touch-action: manipulation;
    }
    .start-btn:active { transform: scale(.95); }
    .start-btn:hover { box-shadow: 0 0 0 8px rgba(255, 209, 120, .15); }

    .hint {
      font-size: .75rem;
      color: #7A86A0;
      margin-top: 6px;
    }

    #result-overlay.hidden { opacity: 0; }
    #result-overlay.show { opacity: 1; }

    .controls {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      padding: 0 12px;
      z-index: 6;
      pointer-events: none;
      gap: 8px;
    }
    .controls > * { pointer-events: auto; }

    .ctrl-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.15);
      color: #E8ECF8;
      font-size: 1.5rem;
      font-weight: 800;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background .12s, border-color .12s, color .12s;
    }
    .ctrl-btn.active {
      background: rgba(255, 209, 120, .22);
      border-color: rgba(255, 209, 120, .55);
      color: #FFD178;
    }

    .fire-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #FFD178;
      border: 3px solid rgba(255,255,255,.9);
      color: #1A1408;
      font-size: 1rem;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: .08em;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      box-shadow: 0 0 24px rgba(255,209,120,.35);
      transition: transform .08s, box-shadow .15s, opacity .15s;
    }
    .fire-btn:active { transform: scale(.94); }
    .fire-btn:disabled {
      opacity: .35;
      filter: grayscale(.6);
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="hud-left">
      <a class="back" href="/">← tools</a>
      <button class="badge" id="retry-btn" style="cursor:pointer;border:1px solid rgba(255,255,255,.1);font-family:inherit;color:#E8ECF8;">↺ やり直す</button>
      <button class="badge" id="demo-btn" style="cursor:pointer;border:1px solid rgba(255,255,255,.1);font-family:inherit;color:#E8ECF8;">👁 お手本</button>
    </div>
    <div class="hud-right">
      <div class="badge"><span class="label">STAGE</span><span class="val" id="stage-num">1</span></div>
      <div class="badge"><span class="label">TARGET</span><span class="val" id="target-count">0/0</span></div>
    </div>
  </div>

  <div id="overlay">
    <div class="title">スイング<span class="accent">バイ</span></div>
    <div class="sub">一発の弾で、的を全部壊せ。<br>惑星の重力を使って軌道を曲げよう。</div>
    <button class="start-btn" id="start-btn">スタート</button>
    <div class="hint">タップ/クリックで照準・発射</div>
  </div>

  <div id="result-overlay" class="hidden" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:8;pointer-events:none;transition:opacity .25s;">
    <div id="result-title" style="font-size:2.4rem;font-weight:800;letter-spacing:.04em;text-shadow:0 0 20px rgba(0,0,0,.6);"></div>
    <div id="result-sub" style="font-size:.85rem;color:#B8C2D6;text-shadow:0 0 8px rgba(0,0,0,.6);"></div>
  </div>

  <div class="controls" id="controls" style="display:none;">
    <button type="button" class="ctrl-btn" data-input="left" aria-label="左へ移動">←</button>
    <button type="button" class="ctrl-btn" data-input="rotL" aria-label="左回転">↺</button>
    <button type="button" class="fire-btn" id="fire-btn">FIRE</button>
    <button type="button" class="ctrl-btn" data-input="rotR" aria-label="右回転">↻</button>
    <button type="button" class="ctrl-btn" data-input="right" aria-label="右へ移動">→</button>
  </div>

  <script>
    // ===== Canvas / DPR =====
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    let DPR = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0, H = 0;

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== Stages (フォールバック用 hand-crafted、座標は 0..1 比率) =====
    const STAGES = [
      {
        name: 'はじめの一歩',
        player:  { x: 0.5, y: 0.85 },
        planets: [
          { x: 0.35, y: 0.55, r: 26, mass: 1300, color: '#7CC8E8' },
          { x: 0.65, y: 0.55, r: 26, mass: 1300, color: '#7CC8E8' },
        ],
        targets: [
          { x: 0.20, y: 0.30 },
          { x: 0.80, y: 0.30 },
        ],
      },
      {
        name: 'まわりこみ',
        player:  { x: 0.5, y: 0.88 },
        planets: [
          { x: 0.35, y: 0.50, r: 32, mass: 2000, color: '#FFB270' },
          { x: 0.70, y: 0.30, r: 24, mass: 900,  color: '#7CC8E8' },
        ],
        targets: [
          { x: 0.18, y: 0.62 },
          { x: 0.85, y: 0.18 },
        ],
      },
      {
        name: 'ジグザグ',
        player:  { x: 0.5, y: 0.88 },
        planets: [
          { x: 0.30, y: 0.62, r: 28, mass: 1500, color: '#7CC8E8' },
          { x: 0.70, y: 0.30, r: 28, mass: 1500, color: '#FFB270' },
        ],
        targets: [
          { x: 0.18, y: 0.30 },
          { x: 0.82, y: 0.62 },
        ],
      },
      {
        name: '挟撃',
        player:  { x: 0.5, y: 0.85 },
        planets: [
          { x: 0.50, y: 0.40, r: 38, mass: 2600, color: '#FFB270' },
          { x: 0.50, y: 0.18, r: 22, mass: 700,  color: '#7CC8E8' },
        ],
        targets: [
          { x: 0.15, y: 0.40 },
          { x: 0.85, y: 0.40 },
        ],
      },
      {
        name: '逆走スイングバイ',
        player:  { x: 0.5, y: 0.90 },
        planets: [
          { x: 0.25, y: 0.78, r: 26, mass: 1500, color: '#FFB270' },
          { x: 0.75, y: 0.78, r: 26, mass: 1500, color: '#FFB270' },
        ],
        targets: [
          { x: 0.30, y: 0.20 },
          { x: 0.70, y: 0.20 },
        ],
      },
      {
        name: '巨星',
        player:  { x: 0.5, y: 0.88 },
        planets: [
          { x: 0.30, y: 0.45, r: 44, mass: 3200, color: '#C99BFF' },
          { x: 0.78, y: 0.55, r: 22, mass: 700,  color: '#7CC8E8' },
        ],
        targets: [
          { x: 0.10, y: 0.18 },
          { x: 0.92, y: 0.20 },
        ],
      },
    ];

    // ===== State =====
    const state = {
      running: false,
      stageNum: 1,
      attempts: 0,
      currentDef: null, // 今のステージ定義（リトライ用に保持）
      player: { x: 0, y: 0, r: 14, angle: -Math.PI / 2 },
      planets: [],
      targets: [],
      stars: [],
      bullets: [],
      input: { left: false, right: false, rotL: false, rotR: false },
      flash: 0,
      lockInput: false,
    };

    // ===== Physics constants =====
    const G = 80000;
    const BULLET_SPEED = 380;
    const BULLET_LIFE = 7;
    const TARGET_R = 13;
    const MOVE_SPEED = 230;        // px/sec
    const ROT_SPEED  = 1.6;        // rad/sec
    const PLAYER_BOTTOM_OFFSET = 130;  // 操作ボタンと干渉しない高さ

    function makeStars(n) {
      const stars = [];
      for (let i = 0; i < n; i++) {
        stars.push({
          x: Math.random(),
          y: Math.random(),
          r: Math.random() * 1.2 + 0.3,
          a: Math.random() * 0.7 + 0.2,
        });
      }
      return stars;
    }

    function applyStage(ratioDef) {
      state.currentDef = ratioDef;
      state.player.x = ratioDef.player.x * W;
      state.player.y = Math.min(ratioDef.player.y * H, H - PLAYER_BOTTOM_OFFSET);
      state.player.angle = -Math.PI / 2;
      state.planets = ratioDef.planets.map(p => ({
        x: p.x * W, y: p.y * H, r: p.r, mass: p.mass, color: p.color,
      }));
      state.targets = ratioDef.targets.map(t => ({
        x: t.x * W, y: t.y * H, r: TARGET_R, hit: false,
      }));
      state.bullets = [];
      state.stars = makeStars(120);
      updateHUD();
    }

    function expandRatio(ratioDef) {
      return {
        player: { x: ratioDef.player.x * W, y: Math.min(ratioDef.player.y * H, H - PLAYER_BOTTOM_OFFSET) },
        planets: ratioDef.planets.map(p => ({
          x: p.x * W, y: p.y * H, r: p.r, mass: p.mass, color: p.color,
        })),
        targets: ratioDef.targets.map(t => ({ x: t.x * W, y: t.y * H })),
      };
    }

    // ===== Random stage generation =====
    const PALETTE = ['#7CC8E8', '#FFB270', '#C99BFF', '#9FE6A0', '#FF9CAB'];
    const rnd = (a, b) => a + Math.random() * (b - a);
    const choice = arr => arr[Math.floor(Math.random() * arr.length)];

    function randomRatioStage() {
      const player = { x: rnd(0.25, 0.75), y: 0.85 };
      const playerPx = { x: player.x * W, y: player.y * H };

      const planets = [];
      for (let i = 0; planets.length < 2 && i < 80; i++) {
        const r = rnd(20, 38);
        const cand = {
          x: rnd(0.15, 0.85),
          y: rnd(0.18, 0.62),
          r, mass: r * 60,
          color: choice(PALETTE),
        };
        let ok = true;
        for (const p of planets) {
          const dx = (cand.x - p.x) * W, dy = (cand.y - p.y) * H;
          if (Math.hypot(dx, dy) < cand.r + p.r + 36) { ok = false; break; }
        }
        if (ok) {
          const dx = (cand.x * W) - playerPx.x, dy = (cand.y * H) - playerPx.y;
          if (Math.hypot(dx, dy) < cand.r + 90) ok = false;
        }
        if (ok) planets.push(cand);
      }
      if (planets.length < 2) return null;

      const targets = [];
      for (let i = 0; targets.length < 2 && i < 100; i++) {
        const cand = { x: rnd(0.10, 0.90), y: rnd(0.10, 0.65) };
        let ok = true;
        for (const p of planets) {
          const dx = (cand.x - p.x) * W, dy = (cand.y - p.y) * H;
          if (Math.hypot(dx, dy) < p.r + 30) { ok = false; break; }
        }
        if (ok) {
          const dx = (cand.x * W) - playerPx.x, dy = (cand.y * H) - playerPx.y;
          if (Math.hypot(dx, dy) < 110) ok = false;
        }
        for (const t of targets) {
          const dx = (cand.x - t.x) * W, dy = (cand.y - t.y) * H;
          if (Math.hypot(dx, dy) < 90) { ok = false; break; }
        }
        if (ok) targets.push(cand);
      }
      if (targets.length < 2) return null;

      return { player, planets, targets };
    }

    // ある (px, angle) で発射した弾が両方の的を当てるかをシミュレート
    function simulateHitsAll(absDef, px, py, angle) {
      const winMask = (1 << absDef.targets.length) - 1;
      const playerR = 14;
      const dt = 1 / 60;
      const maxSteps = Math.floor(60 * BULLET_LIFE);
      const nx = Math.cos(angle), ny = Math.sin(angle);
      let x = px + nx * (playerR + 6);
      let y = py + ny * (playerR + 6);
      let vx = nx * BULLET_SPEED;
      let vy = ny * BULLET_SPEED;
      let hitMask = 0;
      for (let s = 0; s < maxSteps; s++) {
        let ax = 0, ay = 0;
        for (const p of absDef.planets) {
          const dx = p.x - x, dy = p.y - y;
          const r = Math.hypot(dx, dy);
          const safeR = Math.max(r, p.r * 0.6);
          const inv3 = 1 / (safeR * safeR * safeR);
          const a = G * p.mass * inv3;
          ax += a * dx; ay += a * dy;
        }
        vx += ax * dt; vy += ay * dt;
        x  += vx * dt; y  += vy * dt;
        if (x < -60 || x > W + 60 || y < -60 || y > H + 60) return false;
        for (const p of absDef.planets) {
          const dx = x - p.x, dy = y - p.y;
          if (dx * dx + dy * dy < p.r * p.r) return false;
        }
        for (let i = 0; i < absDef.targets.length; i++) {
          if (hitMask & (1 << i)) continue;
          const t = absDef.targets[i];
          const dx = x - t.x, dy = y - t.y;
          const rr = TARGET_R + 4;
          if (dx * dx + dy * dy < rr * rr) hitMask |= (1 << i);
        }
        if (hitMask === winMask) return true;
      }
      return false;
    }

    // 横20分割 × 30度刻み(12方向) で全探索、2ヒット以上で「程よい難度」と判定
    function isSolvable(absDef) {
      const STEPS_X = 20, STEPS_ANGLE = 12, REQUIRED = 2;
      const py = absDef.player.y;
      let count = 0;
      for (let xi = 0; xi < STEPS_X; xi++) {
        const px = 40 + ((W - 80) * xi) / (STEPS_X - 1);
        for (let ai = 0; ai < STEPS_ANGLE; ai++) {
          const angle = (ai * 2 * Math.PI) / STEPS_ANGLE;
          if (simulateHitsAll(absDef, px, py, angle)) {
            count++;
            if (count >= REQUIRED) return true;
          }
        }
      }
      return false;
    }

    function easyFallback() {
      return {
        player: { x: 0.5, y: 0.85 },
        planets: [
          { x: 0.22, y: 0.55, r: 22, mass: 900, color: '#7CC8E8' },
          { x: 0.78, y: 0.55, r: 22, mass: 900, color: '#FFB270' },
        ],
        targets: [
          { x: 0.30, y: 0.18 },
          { x: 0.70, y: 0.18 },
        ],
      };
    }

    function generateSolvableStage() {
      for (let attempt = 0; attempt < 50; attempt++) {
        const ratioDef = randomRatioStage();
        if (!ratioDef) continue;
        if (isSolvable(expandRatio(ratioDef))) return ratioDef;
      }
      return easyFallback();
    }

    // 現在位置に最も近い解を探す（お手本プレイ用）
    function findNearestSolution(absDef, currentPx) {
      const STEPS_X = 20, STEPS_ANGLE = 12;
      const py = absDef.player.y;
      let best = null, bestDist = Infinity;
      for (let xi = 0; xi < STEPS_X; xi++) {
        const px = 40 + ((W - 80) * xi) / (STEPS_X - 1);
        for (let ai = 0; ai < STEPS_ANGLE; ai++) {
          const angle = (ai * 2 * Math.PI) / STEPS_ANGLE;
          if (simulateHitsAll(absDef, px, py, angle)) {
            const dist = Math.abs(px - currentPx);
            if (dist < bestDist) {
              best = { px, angle };
              bestDist = dist;
            }
          }
        }
      }
      return best;
    }

    // ===== Demo (お手本プレイ) =====
    const demo = { active: false, targetPx: 0, targetAngle: 0 };

    function startDemo() {
      if (!state.running || state.lockInput || demo.active || bulletInFlight()) return;
      if (!state.currentDef) return;
      const sol = findNearestSolution(expandRatio(state.currentDef), state.player.x);
      if (!sol) {
        showResult('miss', '解が見つかりません', '', 1200);
        return;
      }
      // 現状の的をリセット（デモは新規発射前提）
      for (const t of state.targets) t.hit = false;
      state.bullets = [];
      updateHUD();

      demo.active = true;
      demo.targetPx = sol.px;
      demo.targetAngle = sol.angle;
      state.lockInput = true;
      // ユーザー入力フラグを念のためクリア
      state.input.left = state.input.right = state.input.rotL = state.input.rotR = false;
      document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
      updateFireBtnState();
    }

    function applyDemo(dt) {
      const p = state.player;
      // 横移動
      const dx = demo.targetPx - p.x;
      if (Math.abs(dx) > 0.5) {
        const move = MOVE_SPEED * dt;
        if (Math.abs(dx) < move) p.x = demo.targetPx;
        else p.x += Math.sign(dx) * move;
      }
      // 回転（最短経路）
      let da = demo.targetAngle - p.angle;
      while (da >  Math.PI) da -= Math.PI * 2;
      while (da < -Math.PI) da += Math.PI * 2;
      if (Math.abs(da) > 0.01) {
        const rot = ROT_SPEED * dt;
        if (Math.abs(da) < rot) p.angle = demo.targetAngle;
        else p.angle += Math.sign(da) * rot;
      }
      // 完了判定 → 発射
      const xDone = Math.abs(p.x - demo.targetPx) < 0.5;
      let n = ((p.angle - demo.targetAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      if (n > Math.PI) n -= Math.PI * 2;
      const aDone = Math.abs(n) < 0.02;
      if (xDone && aDone) {
        demo.active = false;
        // 発射前に lockInput を解除（updateBullets が結果判定するため）
        state.lockInput = false;
        setTimeout(() => fire(), 220);
      }
    }

    function applyInput(dt) {
      const p = state.player;
      if (state.input.left)  p.x -= MOVE_SPEED * dt;
      if (state.input.right) p.x += MOVE_SPEED * dt;
      if (state.input.rotL)  p.angle -= ROT_SPEED * dt;
      if (state.input.rotR)  p.angle += ROT_SPEED * dt;
      p.x = Math.max(40, Math.min(W - 40, p.x));
    }

    function updateHUD() {
      document.getElementById('stage-num').textContent = state.stageNum;
      const remaining = state.targets.filter(t => !t.hit).length;
      const total = state.targets.length;
      document.getElementById('target-count').textContent = (total - remaining) + '/' + total;
      if (typeof updateFireBtnState === 'function') updateFireBtnState();
    }

    function bulletInFlight() { return state.bullets.length > 0; }
    function allCleared() { return state.targets.length > 0 && state.targets.every(t => t.hit); }

    // ===== Physics =====
    function gravityAt(x, y) {
      let ax = 0, ay = 0;
      for (const p of state.planets) {
        const dx = p.x - x;
        const dy = p.y - y;
        const r = Math.hypot(dx, dy);
        const safeR = Math.max(r, p.r * 0.6);
        const inv3 = 1 / (safeR * safeR * safeR);
        const a = G * p.mass * inv3;
        ax += a * dx;
        ay += a * dy;
      }
      return { ax, ay };
    }

    function fire() {
      if (!state.running || state.lockInput || bulletInFlight()) return;
      const p = state.player;
      const nx = Math.cos(p.angle);
      const ny = Math.sin(p.angle);
      state.bullets.push({
        x: p.x + nx * (p.r + 6),
        y: p.y + ny * (p.r + 6),
        vx: nx * BULLET_SPEED,
        vy: ny * BULLET_SPEED,
        life: BULLET_LIFE,
        trail: [],
      });
      state.attempts++;
      updateFireBtnState();
    }

    function endShotFailed() {
      state.bullets = [];
      state.flash = 0.6;
      // 当たった的を戻す（潰したけど他を外したらやり直し）
      for (const t of state.targets) t.hit = false;
      updateHUD();
      showResult('miss', 'もう一度', '惑星に当たった or 外れた');
    }

    function endShotCleared() {
      state.bullets = [];
      state.lockInput = true;
      showResult('clear', 'STAGE CLEAR', '次のステージへ', 1100);
      setTimeout(() => {
        state.stageNum++;
        applyStage(generateSolvableStage());
        state.lockInput = false;
        hideResult();
        updateFireBtnState();
      }, 1200);
    }

    function updateBullets(dt) {
      const startedWithBullets = state.bullets.length > 0;

      for (const b of state.bullets) {
        const g = gravityAt(b.x, b.y);
        b.vx += g.ax * dt;
        b.vy += g.ay * dt;
        b.x  += b.vx * dt;
        b.y  += b.vy * dt;
        b.life -= dt;
        b.trail.push({ x: b.x, y: b.y });
        if (b.trail.length > 28) b.trail.shift();

        // 的との衝突判定
        for (const t of state.targets) {
          if (t.hit) continue;
          const dx = b.x - t.x, dy = b.y - t.y;
          const rr = t.r + 4;
          if (dx * dx + dy * dy < rr * rr) {
            t.hit = true;
            updateHUD();
          }
        }
      }

      // 死亡弾の除去
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        const offBounds = b.x < -60 || b.x > W + 60 || b.y < -60 || b.y > H + 60;
        let hitPlanet = false;
        for (const p of state.planets) {
          const dx = b.x - p.x, dy = b.y - p.y;
          if (dx * dx + dy * dy < p.r * p.r) { hitPlanet = true; break; }
        }
        if (b.life <= 0 || offBounds || hitPlanet) {
          state.bullets.splice(i, 1);
        }
      }

      // 飛行終了の判定（同フレーム消滅も拾える）
      if (startedWithBullets && state.bullets.length === 0 && state.running && !state.lockInput) {
        if (allCleared()) endShotCleared();
        else endShotFailed();
        updateFireBtnState();
      }
    }

    function predictPath() {
      const p = state.player;
      const nx = Math.cos(p.angle);
      const ny = Math.sin(p.angle);
      let x = p.x + nx * (p.r + 6);
      let y = p.y + ny * (p.r + 6);
      let vx = nx * BULLET_SPEED;
      let vy = ny * BULLET_SPEED;
      const path = [];
      const sub = 1 / 60;
      for (let i = 0; i < 110; i++) {
        const g = gravityAt(x, y);
        vx += g.ax * sub;
        vy += g.ay * sub;
        x  += vx * sub;
        y  += vy * sub;
        if (x < 0 || x > W || y < 0 || y > H) break;
        let hit = false;
        for (const pl of state.planets) {
          const ddx = x - pl.x, ddy = y - pl.y;
          if (ddx * ddx + ddy * ddy < pl.r * pl.r) { hit = true; break; }
        }
        if (hit) break;
        if (i % 2 === 0) path.push({ x, y });
      }
      return path;
    }

    // ===== Render =====
    function drawStars() {
      ctx.save();
      for (const s of state.stars) {
        ctx.globalAlpha = s.a;
        ctx.fillStyle = '#E8ECF8';
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPlanet(p) {
      // 重力場リング
      ctx.save();
      const grad = ctx.createRadialGradient(p.x, p.y, p.r * 0.8, p.x, p.y, p.r * 4);
      grad.addColorStop(0, p.color + '55');
      grad.addColorStop(1, p.color + '00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fill();
      // 本体
      const body = ctx.createRadialGradient(
        p.x - p.r * 0.4, p.y - p.r * 0.4, p.r * 0.2,
        p.x, p.y, p.r
      );
      body.addColorStop(0, '#ffffff');
      body.addColorStop(0.4, p.color);
      body.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPlayer(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      // ボディ
      ctx.fillStyle = '#FFD178';
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p.r, 0);
      ctx.lineTo(-p.r * 0.8, p.r * 0.65);
      ctx.lineTo(-p.r * 0.4, 0);
      ctx.lineTo(-p.r * 0.8, -p.r * 0.65);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // コックピット
      ctx.fillStyle = '#7CC8E8';
      ctx.beginPath();
      ctx.arc(0, 0, p.r * 0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawAimLine(path) {
      if (!path.length || bulletInFlight()) return;
      ctx.save();
      for (let i = 0; i < path.length; i++) {
        const t = 1 - i / path.length;
        ctx.globalAlpha = t * 0.55;
        ctx.fillStyle = '#FFD178';
        ctx.beginPath();
        ctx.arc(path[i].x, path[i].y, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawTarget(t, time) {
      ctx.save();
      if (t.hit) {
        // 撃破済みは小さく薄く
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = '#FFD178';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * 0.5, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        const pulse = 1 + Math.sin(time * 4) * 0.08;
        // グロウ
        const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, t.r * 2.4);
        grad.addColorStop(0, 'rgba(255, 230, 150, 0.55)');
        grad.addColorStop(1, 'rgba(255, 209, 120, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * 2.4, 0, Math.PI * 2);
        ctx.fill();
        // リング
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#FFE7A5';
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * pulse, 0, Math.PI * 2);
        ctx.stroke();
        // 中心
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawBullet(b) {
      ctx.save();
      // 軌跡
      for (let i = 0; i < b.trail.length; i++) {
        const t = i / b.trail.length;
        ctx.globalAlpha = t * 0.55;
        ctx.fillStyle = '#FFD178';
        const tp = b.trail[i];
        ctx.beginPath();
        ctx.arc(tp.x, tp.y, 1.5 + t * 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // 弾本体
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 9);
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.4, '#FFD178');
      grad.addColorStop(1, 'rgba(255,209,120,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function render(time) {
      ctx.clearRect(0, 0, W, H);
      // 失敗フラッシュ
      if (state.flash > 0) {
        ctx.fillStyle = 'rgba(240, 138, 138,' + Math.min(0.25, state.flash * 0.4) + ')';
        ctx.fillRect(0, 0, W, H);
      }
      drawStars();
      for (const p of state.planets) drawPlanet(p);
      for (const t of state.targets) drawTarget(t, time);
      if (state.running) {
        drawAimLine(predictPath());
        for (const b of state.bullets) drawBullet(b);
      }
      drawPlayer(state.player);
    }

    // ===== Game loop =====
    let last = 0;
    function loop(ts) {
      const dt = Math.min(0.05, (ts - last) / 1000 || 0);
      last = ts;
      if (state.running) {
        if (demo.active) applyDemo(dt);
        else if (!state.lockInput) applyInput(dt);
        updateBullets(dt);
        state.flash = Math.max(0, state.flash - dt);
      }
      render(ts / 1000);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ===== Result overlay =====
    const resultOverlay = document.getElementById('result-overlay');
    const resultTitle = document.getElementById('result-title');
    const resultSub = document.getElementById('result-sub');
    function showResult(kind, title, sub, ms) {
      resultTitle.textContent = title;
      resultSub.textContent = sub || '';
      resultTitle.style.color = kind === 'clear' ? '#FFD178' : '#F08A8A';
      resultOverlay.classList.remove('hidden');
      resultOverlay.classList.add('show');
      clearTimeout(showResult._t);
      showResult._t = setTimeout(hideResult, ms || 900);
    }
    function hideResult() {
      resultOverlay.classList.remove('show');
      resultOverlay.classList.add('hidden');
    }

    // ===== Input =====
    const fireBtn = document.getElementById('fire-btn');
    function updateFireBtnState() {
      fireBtn.disabled = !state.running || state.lockInput || bulletInFlight();
    }

    function bindHold(btn, key) {
      const press = (e) => {
        e.preventDefault();
        if (state.lockInput || demo.active) return;
        state.input[key] = true;
        btn.classList.add('active');
        if (e.pointerId != null) btn.setPointerCapture?.(e.pointerId);
      };
      const release = () => {
        state.input[key] = false;
        btn.classList.remove('active');
      };
      btn.addEventListener('pointerdown', press);
      btn.addEventListener('pointerup', release);
      btn.addEventListener('pointercancel', release);
      btn.addEventListener('pointerleave', release);
      btn.addEventListener('lostpointercapture', release);
    }
    document.querySelectorAll('[data-input]').forEach(btn => {
      bindHold(btn, btn.dataset.input);
    });

    fireBtn.addEventListener('click', () => fire());

    // キーボードもサポート
    const KEY_MAP = {
      ArrowLeft: 'left', a: 'left', A: 'left',
      ArrowRight: 'right', d: 'right', D: 'right',
      q: 'rotL', Q: 'rotL',
      e: 'rotR', E: 'rotR',
    };
    window.addEventListener('keydown', e => {
      if (state.lockInput || demo.active) return;
      if (KEY_MAP[e.key]) { state.input[KEY_MAP[e.key]] = true; e.preventDefault(); }
      else if (e.key === ' ' || e.key === 'Enter') { fire(); e.preventDefault(); }
    });
    window.addEventListener('keyup', e => {
      if (KEY_MAP[e.key]) { state.input[KEY_MAP[e.key]] = false; e.preventDefault(); }
    });

    // ===== Start =====
    const overlay = document.getElementById('overlay');
    const controlsEl = document.getElementById('controls');
    document.getElementById('start-btn').addEventListener('click', () => {
      state.stageNum = 1;
      state.attempts = 0;
      applyStage(generateSolvableStage());
      state.running = true;
      overlay.classList.add('hidden');
      controlsEl.style.display = 'flex';
      updateFireBtnState();
    });

    document.getElementById('retry-btn').addEventListener('click', () => {
      if (!state.running || state.lockInput || demo.active || !state.currentDef) return;
      applyStage(state.currentDef);
      updateFireBtnState();
    });

    document.getElementById('demo-btn').addEventListener('click', startDemo);

    window.addEventListener('resize', () => {
      if (state.running && state.currentDef) applyStage(state.currentDef);
    });
  </script>
</body>
</html>
