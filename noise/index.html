<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>のんびりノイズ - onemancell tools</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B2541">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0E1730;
      --bg-1: #1B2541;
      --bg-2: #243153;
      --accent: #7CC8E8;
      --accent-soft: #A6DCEF;
      --accent-glow: rgba(124, 200, 232, .35);
      --ink-50: #F2F5FA;
      --ink-300: #B8C2D6;
      --ink-500: #7A86A0;
      --danger: #F08A8A;
      --radius-md: 16px;
      --radius-lg: 22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100dvh;
    }

    body {
      font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background:
        radial-gradient(ellipse at top, #243153 0%, #0E1730 60%) fixed,
        var(--bg-0);
      color: var(--ink-50);
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 6px 0;
    }
    .brand {
      font-size: .82rem;
      font-weight: 700;
      color: var(--ink-300);
      letter-spacing: .04em;
      text-decoration: none;
    }
    .brand span { color: var(--accent); }
    .title {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--ink-50);
    }
    .title .em { color: var(--accent); }

    .panel {
      width: 100%;
      max-width: 720px;
      background: rgba(27, 37, 65, .65);
      border: 1px solid rgba(124, 200, 232, .15);
      border-radius: var(--radius-lg);
      padding: 18px 18px 20px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .master {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .master-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .play-btn {
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg-0);
      border: none;
      font-size: 1.6rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 0 var(--accent-glow);
      transition: transform .12s, box-shadow .25s, background .15s;
      touch-action: manipulation;
      font-family: inherit;
    }
    .play-btn:active { transform: scale(.94); }
    .play-btn.playing {
      box-shadow: 0 0 0 12px var(--accent-glow);
    }

    .master-meta {
      flex-grow: 1;
      min-width: 140px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .master-label {
      font-size: .72rem;
      color: var(--ink-500);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .master-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink-50);
      font-variant-numeric: tabular-nums;
    }

    .master-vol {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .master-vol-label {
      font-size: .75rem;
      color: var(--ink-300);
      font-weight: 700;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg-1);
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg-1);
      cursor: pointer;
    }

    .timer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .timer-row select {
      flex-grow: 1;
      background: rgba(255,255,255,.06);
      color: var(--ink-50);
      border: 1px solid rgba(124, 200, 232, .2);
      border-radius: 12px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 5l3 3 3-3' stroke='%237CC8E8' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: 32px;
    }

    .tracks {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    @media (min-width: 540px) {
      .tracks { grid-template-columns: 1fr 1fr; }
    }

    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius-md);
      transition: border-color .2s, background .2s;
    }
    .track.on {
      background: rgba(124, 200, 232, .08);
      border-color: rgba(124, 200, 232, .35);
    }

    .track-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      color: inherit;
      font-family: inherit;
      transition: background .2s, transform .12s;
      touch-action: manipulation;
    }
    .track-icon:active { transform: scale(.92); }
    .track.on .track-icon {
      background: rgba(124, 200, 232, .25);
    }

    .track-body {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .track-name {
      font-size: .9rem;
      font-weight: 700;
      color: var(--ink-50);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .track-vol-label {
      font-size: .72rem;
      color: var(--ink-500);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    .preset-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .preset-chip {
      flex-grow: 1;
      min-width: 0;
      background: rgba(255,255,255,.05);
      color: var(--ink-300);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 9px 14px;
      font-family: inherit;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      touch-action: manipulation;
    }
    .preset-chip:active { transform: scale(.96); }
    .preset-chip.primary {
      background: var(--accent);
      color: var(--bg-0);
      border-color: var(--accent);
    }
    .preset-chip.ghost {
      flex-grow: 0;
    }

    .section-label {
      font-size: .7rem;
      color: var(--ink-500);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hint {
      font-size: .72rem;
      color: var(--ink-500);
      text-align: center;
      max-width: 720px;
      line-height: 1.6;
    }

    #unlock-overlay {
      position: fixed;
      inset: 0;
      background: rgba(14, 23, 48, .85);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      z-index: 999;
      cursor: pointer;
      color: var(--ink-50);
      font-weight: 700;
      transition: opacity .3s;
    }
    #unlock-overlay.hidden { opacity: 0; pointer-events: none; }
    #unlock-overlay .big { font-size: 2.4rem; }
    #unlock-overlay .sub { font-size: .85rem; color: var(--ink-300); font-weight: 500; }
  </style>
</head>
<body>

  <div id="unlock-overlay">
    <div class="big">🌙</div>
    <div>タップして はじめる</div>
    <div class="sub">音声の再生準備をします</div>
  </div>

  <div class="topbar">
    <a class="brand" href="/">← onemancell <span>tools</span></a>
    <div class="title"><span class="em">のんびり</span>ノイズ</div>
  </div>

  <div class="panel">
    <div class="master">
      <div class="master-row">
        <button class="play-btn" id="play-btn" aria-label="再生 / 停止">▶</button>
        <div class="master-meta">
          <div class="master-label">STATUS</div>
          <div class="master-value" id="status-text">停止中</div>
        </div>
      </div>
      <div class="master-vol">
        <span class="master-vol-label">🔈</span>
        <input type="range" id="master-vol" min="0" max="100" value="70">
        <span class="master-vol-label">🔊</span>
      </div>
      <div class="timer-row">
        <span class="master-vol-label">⏰ スリープ</span>
        <select id="sleep-timer">
          <option value="0">オフ</option>
          <option value="15">15分</option>
          <option value="30">30分</option>
          <option value="45">45分</option>
          <option value="60">60分</option>
          <option value="90">90分</option>
          <option value="120">120分</option>
        </select>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="section-label">サウンド</div>
    <div class="tracks" id="tracks"></div>
  </div>

  <div class="panel">
    <div class="section-label">プリセット</div>
    <div class="preset-row" id="preset-row">
      <button class="preset-chip" data-preset="rain">☔ 雨の日</button>
      <button class="preset-chip" data-preset="ocean">🌊 海辺</button>
      <button class="preset-chip" data-preset="forest">🍃 森の風</button>
      <button class="preset-chip" data-preset="cabin">🔥 山小屋</button>
      <button class="preset-chip" data-preset="sleep">😴 おやすみ</button>
    </div>
    <div style="height:10px"></div>
    <div class="preset-row">
      <button class="preset-chip primary" id="save-mine">★ いまの組み合わせを保存</button>
      <button class="preset-chip ghost" id="load-mine">↺ 呼出</button>
      <button class="preset-chip ghost" id="reset-all">⟲ 全停止</button>
    </div>
  </div>

  <div class="hint">
    すべての音はブラウザ内で合成されています。<br>
    ブックマークしたり、ホーム画面に追加してアプリのように使えます。
  </div>

  <script>
    const TRACKS = [
      { id: 'rain',   icon: '☔', name: '雨' },
      { id: 'wave',   icon: '🌊', name: '波' },
      { id: 'wind',   icon: '🍃', name: '風' },
      { id: 'fire',   icon: '🔥', name: '焚き火' },
      { id: 'white',  icon: '⚪', name: 'ホワイトノイズ' },
      { id: 'pink',   icon: '🌸', name: 'ピンクノイズ' },
      { id: 'brown',  icon: '🟫', name: 'ブラウンノイズ' },
    ];

    const state = {
      master: 0.7,
      playing: false,
      tracks: Object.fromEntries(TRACKS.map(t => [
        t.id, { on: t.id === 'rain', vol: 0.5 }
      ])),
    };

    const els = {};

    // ===== Web Audio =====
    const audio = {
      ctx: null,
      master: null,
      buffers: {},
      tracks: {},
    };
    const RAMP = 0.08;

    function makeWhiteBuffer(ctx, seconds) {
      const buf = ctx.createBuffer(1, ctx.sampleRate * seconds, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      return buf;
    }

    function makePinkBuffer(ctx, seconds) {
      const buf = ctx.createBuffer(1, ctx.sampleRate * seconds, ctx.sampleRate);
      const data = buf.getChannelData(0);
      let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
      for (let i = 0; i < data.length; i++) {
        const w = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + w * 0.0555179;
        b1 = 0.99332 * b1 + w * 0.0750759;
        b2 = 0.96900 * b2 + w * 0.1538520;
        b3 = 0.86650 * b3 + w * 0.3104856;
        b4 = 0.55000 * b4 + w * 0.5329522;
        b5 = -0.7616 * b5 - w * 0.0168980;
        data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) * 0.11;
        b6 = w * 0.115926;
      }
      return buf;
    }

    function makeBrownBuffer(ctx, seconds) {
      const buf = ctx.createBuffer(1, ctx.sampleRate * seconds, ctx.sampleRate);
      const data = buf.getChannelData(0);
      let last = 0;
      for (let i = 0; i < data.length; i++) {
        const w = Math.random() * 2 - 1;
        last = (last + 0.02 * w) / 1.02;
        data[i] = last * 3.5;
      }
      return buf;
    }

    function loopSource(buffer) {
      const src = audio.ctx.createBufferSource();
      src.buffer = buffer;
      src.loop = true;
      src.start();
      return src;
    }

    function buildTrack(id) {
      const ctx = audio.ctx;
      const trackGain = ctx.createGain();
      trackGain.gain.value = 0;
      trackGain.connect(audio.master);
      const nodes = { gain: trackGain };

      switch (id) {
        case 'white': {
          const src = loopSource(audio.buffers.white);
          const trim = ctx.createGain(); trim.gain.value = 0.45;
          src.connect(trim).connect(trackGain);
          break;
        }
        case 'pink': {
          const src = loopSource(audio.buffers.pink);
          const trim = ctx.createGain(); trim.gain.value = 1.0;
          src.connect(trim).connect(trackGain);
          break;
        }
        case 'brown': {
          const src = loopSource(audio.buffers.brown);
          const trim = ctx.createGain(); trim.gain.value = 1.1;
          src.connect(trim).connect(trackGain);
          break;
        }
        case 'rain': {
          const src = loopSource(audio.buffers.white);
          const hp = ctx.createBiquadFilter();
          hp.type = 'highpass'; hp.frequency.value = 400;
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass'; lp.frequency.value = 3200; lp.Q.value = 0.6;
          const trim = ctx.createGain(); trim.gain.value = 1.6;
          src.connect(hp).connect(lp).connect(trim).connect(trackGain);
          // ゆっくり強弱
          const lfo = ctx.createOscillator();
          lfo.frequency.value = 0.07;
          const lfoGain = ctx.createGain(); lfoGain.gain.value = 700;
          lfo.connect(lfoGain).connect(lp.frequency);
          lfo.start();
          break;
        }
        case 'wave': {
          const src = loopSource(audio.buffers.brown);
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass'; lp.frequency.value = 700;
          const ampMod = ctx.createGain(); ampMod.gain.value = 0.5;
          const trim = ctx.createGain(); trim.gain.value = 1.6;
          src.connect(lp).connect(ampMod).connect(trim).connect(trackGain);
          // 寄せては返すうねり
          const lfo = ctx.createOscillator();
          lfo.type = 'sine';
          lfo.frequency.value = 0.12;
          const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.45;
          lfo.connect(lfoGain).connect(ampMod.gain);
          lfo.start();
          break;
        }
        case 'wind': {
          const src = loopSource(audio.buffers.brown);
          const bp = ctx.createBiquadFilter();
          bp.type = 'bandpass'; bp.frequency.value = 600; bp.Q.value = 1.4;
          const trim = ctx.createGain(); trim.gain.value = 4.5;
          src.connect(bp).connect(trim).connect(trackGain);
          // 風のピッチ揺らぎ
          const lfo = ctx.createOscillator();
          lfo.type = 'sine';
          lfo.frequency.value = 0.09;
          const lfoGain = ctx.createGain(); lfoGain.gain.value = 380;
          lfo.connect(lfoGain).connect(bp.frequency);
          lfo.start();
          break;
        }
        case 'fire': {
          // 低音の燃焼ベッド
          const src = loopSource(audio.buffers.pink);
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass'; lp.frequency.value = 700;
          const trim = ctx.createGain(); trim.gain.value = 1.0;
          src.connect(lp).connect(trim).connect(trackGain);
          // パチパチはスケジューラで動的生成（trackGain にバスする）
          nodes.crackleTimer = null;
          break;
        }
      }
      audio.tracks[id] = nodes;
    }

    function fireCrackleBurst() {
      const ctx = audio.ctx;
      if (!ctx) return;
      const len = 0.03 + Math.random() * 0.07;
      const sampleCount = Math.floor(ctx.sampleRate * len);
      const buf = ctx.createBuffer(1, sampleCount, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sampleCount; i++) {
        const env = Math.exp(-i / sampleCount * 7);
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 1500;
      const g = ctx.createGain();
      g.gain.value = 0.25 + Math.random() * 0.45;
      src.connect(hp).connect(g).connect(audio.tracks.fire.gain);
      src.start();
      src.stop(ctx.currentTime + len + 0.05);
    }

    function startFireCrackle() {
      const f = audio.tracks.fire;
      if (!f || f.crackleTimer) return;
      const tick = () => {
        if (!state.tracks.fire.on || !state.playing) {
          f.crackleTimer = null;
          return;
        }
        fireCrackleBurst();
        f.crackleTimer = setTimeout(tick, 50 + Math.random() * 380);
      };
      tick();
    }

    async function ensureAudio() {
      if (audio.ctx) {
        if (audio.ctx.state === 'suspended') await audio.ctx.resume();
        return;
      }
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      audio.ctx = ctx;
      if (ctx.state === 'suspended') await ctx.resume();
      audio.master = ctx.createGain();
      audio.master.gain.value = 0;
      audio.master.connect(ctx.destination);
      audio.buffers.white = makeWhiteBuffer(ctx, 5);
      audio.buffers.pink  = makePinkBuffer(ctx, 5);
      audio.buffers.brown = makeBrownBuffer(ctx, 8);
      TRACKS.forEach(t => buildTrack(t.id));
    }

    function rampTrackGain(id) {
      const node = audio.tracks[id];
      if (!node) return;
      const target = state.tracks[id].on ? state.tracks[id].vol : 0;
      const t = audio.ctx.currentTime;
      node.gain.gain.cancelScheduledValues(t);
      node.gain.gain.setTargetAtTime(target, t, RAMP);
    }

    function rampMasterGain() {
      if (!audio.master) return;
      const target = state.playing ? state.master : 0;
      const t = audio.ctx.currentTime;
      audio.master.gain.cancelScheduledValues(t);
      audio.master.gain.setTargetAtTime(target, t, RAMP);
    }

    function buildTracks() {
      const container = document.getElementById('tracks');
      container.innerHTML = TRACKS.map(t => {
        const v = Math.round(state.tracks[t.id].vol * 100);
        const onCls = state.tracks[t.id].on ? ' on' : '';
        return `
        <div class="track${onCls}" data-id="${t.id}">
          <button type="button" class="track-icon" data-toggle="${t.id}" aria-label="${t.name} ON/OFF">${t.icon}</button>
          <div class="track-body">
            <div class="track-name">
              <span>${t.name}</span>
              <span class="track-vol-label" id="vol-label-${t.id}">${v}</span>
            </div>
            <input type="range" min="0" max="100" value="${v}" data-vol="${t.id}">
          </div>
        </div>`;
      }).join('');

      container.querySelectorAll('[data-toggle]').forEach(btn => {
        btn.addEventListener('click', () => toggleTrack(btn.dataset.toggle));
      });
      container.querySelectorAll('[data-vol]').forEach(input => {
        input.addEventListener('input', e => setTrackVol(input.dataset.vol, +e.target.value / 100));
      });
    }

    async function toggleTrack(id) {
      state.tracks[id].on = !state.tracks[id].on;
      renderTrack(id);
      if (state.playing) {
        await ensureAudio();
        rampTrackGain(id);
        if (id === 'fire' && state.tracks.fire.on) startFireCrackle();
      }
    }
    function setTrackVol(id, v) {
      state.tracks[id].vol = v;
      document.getElementById(`vol-label-${id}`).textContent = Math.round(v * 100);
      if (state.playing && state.tracks[id].on && audio.ctx) rampTrackGain(id);
    }
    function renderTrack(id) {
      const el = document.querySelector(`.track[data-id="${id}"]`);
      el.classList.toggle('on', state.tracks[id].on);
    }

    async function togglePlay() {
      state.playing = !state.playing;
      els.playBtn.textContent = state.playing ? '■' : '▶';
      els.playBtn.classList.toggle('playing', state.playing);

      if (state.playing) {
        await ensureAudio();
        TRACKS.forEach(t => rampTrackGain(t.id));
        rampMasterGain();
        if (state.tracks.fire.on) startFireCrackle();
        requestWakeLock();
        startSleepTimer();
      } else {
        rampMasterGain();
        stopSleepTimer();
        releaseWakeLock();
      }
      updateStatusText();
    }

    async function unlock() {
      els.unlockOverlay.classList.add('hidden');
      try { await ensureAudio(); } catch (e) { console.error(e); }
    }

    // ===== プリセット =====
    const BUILTIN_PRESETS = {
      rain:   { rain: 0.7, wind: 0.25 },
      ocean:  { wave: 0.75, wind: 0.2 },
      forest: { wind: 0.55, rain: 0.3 },
      cabin:  { fire: 0.7, wind: 0.2 },
      sleep:  { brown: 0.45, rain: 0.3 },
    };
    const STORAGE_KEY = 'omc-noise-preset-v1';

    function applyTrackMap(map) {
      // map: { trackId: vol } — それ以外は OFF にする
      TRACKS.forEach(t => {
        const v = map[t.id];
        if (typeof v === 'number' && v > 0) {
          state.tracks[t.id].on = true;
          state.tracks[t.id].vol = v;
        } else {
          state.tracks[t.id].on = false;
        }
      });
      syncUIFromState();
      if (state.playing && audio.ctx) {
        TRACKS.forEach(t => rampTrackGain(t.id));
        if (state.tracks.fire.on) startFireCrackle();
      }
    }

    function syncUIFromState() {
      TRACKS.forEach(t => {
        renderTrack(t.id);
        const slider = document.querySelector(`[data-vol="${t.id}"]`);
        const label  = document.getElementById(`vol-label-${t.id}`);
        if (slider) slider.value = Math.round(state.tracks[t.id].vol * 100);
        if (label)  label.textContent = Math.round(state.tracks[t.id].vol * 100);
      });
    }

    function applyPreset(name) {
      const p = BUILTIN_PRESETS[name];
      if (!p) return;
      applyTrackMap(p);
    }

    function saveMyPreset() {
      const map = {};
      TRACKS.forEach(t => {
        if (state.tracks[t.id].on) map[t.id] = state.tracks[t.id].vol;
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ tracks: map, master: state.master }));
      flashChip(els.saveMine, '保存しました ✓');
    }

    function loadMyPreset() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        flashChip(els.loadMine, '保存なし');
        return;
      }
      try {
        const data = JSON.parse(raw);
        if (data.tracks) applyTrackMap(data.tracks);
        if (typeof data.master === 'number') {
          state.master = data.master;
          els.masterVol.value = Math.round(data.master * 100);
          if (state.playing) rampMasterGain();
        }
      } catch (e) {
        console.error(e);
      }
    }

    function resetAll() {
      applyTrackMap({});
    }

    function flashChip(el, msg) {
      if (!el) return;
      const original = el.dataset.original || el.textContent;
      el.dataset.original = original;
      el.textContent = msg;
      clearTimeout(el._flashTimer);
      el._flashTimer = setTimeout(() => { el.textContent = original; }, 1200);
    }

    // ===== スリープタイマー =====
    const sleep = { minutes: 0, endTs: null, intervalId: null, fading: false };
    const FADE_SEC = 10;

    function startSleepTimer() {
      if (sleep.minutes <= 0) return;
      sleep.endTs = Date.now() + sleep.minutes * 60 * 1000;
      sleep.fading = false;
      tickSleep();
      if (sleep.intervalId) clearInterval(sleep.intervalId);
      sleep.intervalId = setInterval(tickSleep, 500);
    }

    function stopSleepTimer() {
      sleep.endTs = null;
      sleep.fading = false;
      if (sleep.intervalId) {
        clearInterval(sleep.intervalId);
        sleep.intervalId = null;
      }
      updateStatusText();
    }

    function tickSleep() {
      if (!state.playing || !sleep.endTs) {
        stopSleepTimer();
        return;
      }
      const remaining = sleep.endTs - Date.now();
      if (remaining <= 0) {
        // タイマー満了 → 完全停止
        sleep.endTs = null;
        sleep.fading = false;
        clearInterval(sleep.intervalId);
        sleep.intervalId = null;
        if (state.playing) togglePlay();
        return;
      }
      // フェード開始
      if (!sleep.fading && remaining <= FADE_SEC * 1000 && audio.master && audio.ctx) {
        sleep.fading = true;
        const t = audio.ctx.currentTime;
        audio.master.gain.cancelScheduledValues(t);
        audio.master.gain.setValueAtTime(audio.master.gain.value, t);
        audio.master.gain.linearRampToValueAtTime(0, t + remaining / 1000);
      }
      updateStatusText();
    }

    function updateStatusText() {
      if (!state.playing) {
        els.statusText.textContent = '停止中';
        return;
      }
      if (sleep.endTs) {
        const remaining = Math.max(0, sleep.endTs - Date.now());
        const m = Math.floor(remaining / 60000);
        const s = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
        els.statusText.textContent = `あと ${m}:${s}`;
      } else {
        els.statusText.textContent = '再生中';
      }
    }

    // ===== WakeLock =====
    let wakeLock = null;

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      } catch (e) { /* 権限なし or 非対応 */ }
    }

    async function releaseWakeLock() {
      if (wakeLock) {
        try { await wakeLock.release(); } catch (e) {}
        wakeLock = null;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      els.playBtn = document.getElementById('play-btn');
      els.statusText = document.getElementById('status-text');
      els.masterVol = document.getElementById('master-vol');
      els.sleepTimer = document.getElementById('sleep-timer');
      els.unlockOverlay = document.getElementById('unlock-overlay');
      els.saveMine = document.getElementById('save-mine');
      els.loadMine = document.getElementById('load-mine');
      els.resetAll = document.getElementById('reset-all');

      buildTracks();

      els.playBtn.addEventListener('click', togglePlay);
      els.masterVol.addEventListener('input', e => {
        state.master = +e.target.value / 100;
        if (state.playing && audio.master) rampMasterGain();
      });

      document.querySelectorAll('[data-preset]').forEach(btn => {
        btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
      });
      els.saveMine.addEventListener('click', saveMyPreset);
      els.loadMine.addEventListener('click', loadMyPreset);
      els.resetAll.addEventListener('click', resetAll);

      els.sleepTimer.addEventListener('change', e => {
        sleep.minutes = +e.target.value;
        if (state.playing) {
          if (sleep.minutes > 0) startSleepTimer();
          else stopSleepTimer();
        }
      });

      // タブ復帰時に WakeLock を再取得
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && state.playing) {
          requestWakeLock();
        }
      });

      els.unlockOverlay.addEventListener('click', unlock);
    });
  </script>
</body>
</html>
