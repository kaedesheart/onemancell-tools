<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>べんりツールズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'M PLUS Rounded 1c', -apple-system, sans-serif;
      background: transparent;
      padding: 4px 2px 8px;
      color: #2A1810;
    }

    /* ── Header ── */
    .section-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .section-eyebrow {
      font-size: .78rem;
      font-weight: 700;
      color: #FF6B1A;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }
    .section-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #2A1810;
      letter-spacing: -.01em;
    }

    /* ── Card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      border: 1.5px solid #F0E8E0;
      padding: 20px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 2px 12px rgba(42,24,16,.05);
      position: relative;
    }

    .pick-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #FF6B1A;
      color: #fff;
      font-size: .65rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 50px;
      letter-spacing: .05em;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #FFE8D6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .name {
      font-weight: 800;
      font-size: .95rem;
      line-height: 1.35;
      padding-right: 36px;
    }

    .desc {
      font-size: .75rem;
      color: #8A7A70;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      background: #FF6B1A;
      color: #fff;
      border-radius: 50px;
      padding: 9px 24px;
      font-size: .82rem;
      font-weight: 800;
      text-decoration: none;
      font-family: inherit;
      transition: background .15s, transform .1s;
      align-self: flex-start;
    }
    .btn:hover { background: #E85A0D; }
    .btn:active { transform: scale(0.96); }

    /* ── Footer button ── */
    .all-btn-wrap {
      text-align: center;
    }
    .all-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FFF0E6;
      color: #E85A0D;
      border-radius: 50px;
      padding: 11px 28px;
      font-size: .88rem;
      font-weight: 800;
      text-decoration: none;
      font-family: inherit;
      transition: background .15s;
    }
    .all-btn:hover { background: #FFE0CC; }
    .all-btn-arrow {
      font-size: 1.1rem;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .name { padding-right: 40px; }
    }
  </style>
</head>
<body>

  <div class="section-header">
    <div class="section-eyebrow">\ すぐ使える！ /</div>
    <div class="section-title">おすすめツール</div>
  </div>

  <div class="grid">

    <div class="card">
      <span class="pick-badge">PICK</span>
      <div class="card-top">
        <div class="icon">🎲</div>
        <div class="name">エモクロアダイスツール</div>
      </div>
      <div class="desc">エモクロアTRPG 用の判定・ステータス管理</div>
      <a class="btn" href="https://tools.onemancell.com/dice/" target="_blank" rel="noopener">使う</a>
    </div>

    <div class="card">
      <span class="pick-badge">PICK</span>
      <div class="card-top">
        <div class="icon">🍅</div>
        <div class="name">ポモドーロタイマー</div>
      </div>
      <div class="desc">25分集中・休憩サイクルで生産性アップ</div>
      <a class="btn" href="https://tools.onemancell.com/pomo/" target="_blank" rel="noopener">使う</a>
    </div>

    <div class="card">
      <span class="pick-badge">PICK</span>
      <div class="card-top">
        <div class="icon">🧩</div>
        <div class="name">曼荼羅タスク分解</div>
      </div>
      <div class="desc">3×3 グリッドでタスクを細分化・整理</div>
      <a class="btn" href="https://tools.onemancell.com/mandala/" target="_blank" rel="noopener">使う</a>
    </div>

  </div>

  <div class="all-btn-wrap">
    <a class="all-btn" href="https://tools.onemancell.com/" target="_blank" rel="noopener">
      すべてのツールを見る
      <span class="all-btn-arrow">→</span>
    </a>
  </div>

</body>
</html>
