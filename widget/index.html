<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>べんりツールズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'M PLUS Rounded 1c', -apple-system, sans-serif;
      background: transparent;
      padding: 4px 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1.5px solid #F5EFE9;
      padding: 18px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 6px;
      box-shadow: 0 2px 10px rgba(42,24,16,.05);
    }

    .icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: #FFE8D6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 2px;
    }

    .name {
      font-weight: 800;
      font-size: .88rem;
      color: #2A1810;
      line-height: 1.3;
    }

    .desc {
      font-size: .72rem;
      color: #8A7A70;
      line-height: 1.5;
      flex: 1;
    }

    .btn {
      margin-top: 10px;
      display: inline-block;
      background: #FF6B1A;
      color: #fff;
      border-radius: 50px;
      padding: 7px 22px;
      font-size: .8rem;
      font-weight: 700;
      text-decoration: none;
      font-family: inherit;
      transition: background .15s;
    }

    .btn:hover { background: #E85A0D; }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="grid">

    <div class="card">
      <div class="icon">🎲</div>
      <div class="name">エモクロアダイスツール</div>
      <div class="desc">エモクロアTRPG 用の判定・ステータス管理</div>
      <a class="btn" href="https://tools.onemancell.com/dice/" target="_blank" rel="noopener">使う</a>
    </div>

    <div class="card">
      <div class="icon">🍅</div>
      <div class="name">ポモドーロタイマー</div>
      <div class="desc">25分集中・休憩サイクルで生産性アップ</div>
      <a class="btn" href="https://tools.onemancell.com/pomo/" target="_blank" rel="noopener">使う</a>
    </div>

    <div class="card">
      <div class="icon">🧩</div>
      <div class="name">曼荼羅タスク分解</div>
      <div class="desc">3×3 グリッドでタスクを細分化・整理</div>
      <a class="btn" href="https://tools.onemancell.com/mandala/" target="_blank" rel="noopener">使う</a>
    </div>

  </div>
</body>
</html>
