<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>べんりツールズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'M PLUS Rounded 1c', -apple-system, sans-serif;
      background: transparent;
      padding: 8px 4px 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      border: 1.5px solid #F0E8E0;
      padding: 28px 16px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      box-shadow: 0 4px 16px rgba(42,24,16,.06);
      transition: transform .2s, box-shadow .2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(255,107,26,.12);
    }

    .icon {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: #FFE8D6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      margin-bottom: 4px;
    }

    .name {
      font-weight: 800;
      font-size: .95rem;
      color: #2A1810;
      line-height: 1.3;
    }

    .desc {
      font-size: .75rem;
      color: #8A7A70;
      line-height: 1.6;
      flex: 1;
    }

    .btn {
      margin-top: 12px;
      display: inline-block;
      background: #FF6B1A;
      color: #fff;
      border-radius: 50px;
      padding: 10px 28px;
      font-size: .85rem;
      font-weight: 800;
      text-decoration: none;
      font-family: inherit;
      transition: background .15s, transform .1s;
    }

    .btn:hover { background: #E85A0D; }
    .btn:active { transform: scale(0.96); }

    @media (max-width: 500px) {
      .grid { grid-template-columns: repeat(1, 1fr); gap: 12px; }
      .card { flex-direction: row; padding: 18px 20px; text-align: left; align-items: center; gap: 16px; }
      .icon { flex-shrink: 0; margin-bottom: 0; width: 52px; height: 52px; }
      .card-body { flex: 1; display: flex; flex-direction: column; gap: 4px; }
      .btn { margin-top: 0; padding: 8px 20px; }
    }
  </style>
</head>
<body>
  <div class="grid">

    <div class="card">
      <div class="icon">🎲</div>
      <div class="name">エモクロア<br>ダイスツール</div>
      <div class="desc">エモクロアTRPG 用の<br>判定・ステータス管理</div>
      <a class="btn" href="https://tools.onemancell.com/dice/" target="_blank" rel="noopener">使う</a>
    </div>

    <div class="card">
      <div class="icon">🍅</div>
      <div class="name">ポモドーロ<br>タイマー</div>
      <div class="desc">25分集中・休憩サイクルで<br>生産性アップ</div>
      <a class="btn" href="https://tools.onemancell.com/pomo/" target="_blank" rel="noopener">使う</a>
    </div>

    <div class="card">
      <div class="icon">🧩</div>
      <div class="name">曼荼羅<br>タスク分解</div>
      <div class="desc">3×3 グリッドで<br>タスクを細分化・整理</div>
      <a class="btn" href="https://tools.onemancell.com/mandala/" target="_blank" rel="noopener">使う</a>
    </div>

  </div>
</body>
</html>
